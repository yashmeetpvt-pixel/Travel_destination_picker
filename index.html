<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trip Finder</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header>
    <h1>Trip Finder</h1>
    <p>Search and explore destinations around the world</p>
  </header>

  <section class="filters">
    <input type="text" id="searchInput" placeholder="Search country or capital..."/>

    <select id="regionSelect">
      <option value="">All Regions</option>
      <option value="Africa">Africa</option>
      <option value="Americas">Americas</option>
      <option value="Asia">Asia</option>
      <option value="Europe">Europe</option>
      <option value="Oceania">Oceania</option>
    </select>

    <select id="sortSelect">
      <option value="name-asc">Name A–Z</option>
      <option value="name-desc">Name Z–A</option>
      <option value="pop-desc">Population (High–Low)</option>
      <option value="pop-asc">Population (Low–High)</option>
    </select>

    <button id="randomBtn">Random Destination</button>
  </section>

  <div id="status"></div>

  <section id="cardGrid" class="card-grid"></section>

  <div id="wishlistBar" class="wishlist-bar hidden">
    <span id="wishlistLabel">Wishlist (0)</span>
    <button id="viewWishlist">View</button>
    <button id="clearWishlist">Clear all</button>
  </div>

  <div id="wishlistModal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-top">
        <h2>My Wishlist</h2>
        <button id="closeModal">✕</button>
      </div>
      <ul id="wishlistItems"></ul>
    </div>
  </div>

  <script src="script.js" defer></script>
